<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎀 Bot Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Анимированный фон -->
    <div class="animated-bg"></div>
    <div class="particles"></div>

    <!-- Контейнер -->
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <h1>🎀 Bot Control</h1>
            <p>Панель управления ботом</p>
        </div>

        <!-- Статус бар -->
        <div class="status-bar">
            <div class="status-info">
                <div class="status-dot"></div>
                <span id="statusText">Подключено</span>
            </div>
            <span id="userId">--</span>
        </div>

        <!-- Сетка кнопок -->
        <div class="buttons-grid">
            <button class="btn" onclick="openModal('stop')">
                🛑
                <span>Стоп</span>
            </button>
            <button class="btn" onclick="openModal('friends')">
                🤝
                <span>Дружим</span>
            </button>
            <button class="btn" onclick="openModal('balance')">
                💵
                <span>Баланс</span>
            </button>

            <button class="btn" onclick="sendCommand('!res')">
                💰
                <span>Ресы</span>
            </button>
            <button class="btn" onclick="sendCommand('!shield')">
                🛡
                <span>Щит</span>
            </button>
            <button class="btn" onclick="openModal('hunt')">
                🎯
                <span>Охота</span>
            </button>

            <button class="btn" onclick="sendCommand('!stats')">
                📊
                <span>Стат</span>
            </button>
            <button class="btn" onclick="openModal('camp')">
                ⛺
                <span>Лагерь</span>
            </button>
            <button class="btn" onclick="sendCommand('!dragon')">
                🐉
                <span>Дракон</span>
            </button>

            <button class="btn" onclick="sendCommand('!exped')">
                🧭
                <span>Экспед</span>
            </button>
            <button class="btn" onclick="sendCommand('!msg')">
                📢
                <span>Сообщ</span>
            </button>
            <button class="btn" onclick="sendCommand('!restart')">
                🔄
                <span>Рестарт</span>
            </button>

            <button class="btn btn-full" onclick="sendCommand('/menu')">
                🏠
                <span>Главное Меню</span>
            </button>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <!-- Контент загружается динамически -->
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
