<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎀 Bot Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ✅ Стили для панели логов */
        #debugPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            font-family: monospace;
            font-size: 11px;
            overflow: auto;
            padding: 10px;
            display: none;
            z-index: 9999;
            border-top: 2px solid #f7931a;
        }

        #debugPanel.show {
            display: block;
        }

        #debugPanel .log-entry {
            margin: 2px 0;
            padding: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #debugPanel .log-entry.error {
            color: #ff5252;
        }

        #debugPanel .log-entry.success {
            color: #00ff00;
        }

        #debugPanel .log-entry.info {
            color: #00d4aa;
        }

        #toggleDebug {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: #f7931a;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 10000;
            opacity: 0.5;
        }

        #toggleDebug:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="animated-bg"></div>
    <div class="particles"></div>

    <div class="container">
        <div class="header">
            <h1>🎀 Bot Control</h1>
            <p>Панель управления ботом</p>
        </div>

        <div class="status-bar">
            <div class="status-info">
                <div class="status-dot"></div>
                <span id="statusText">Подключено</span>
            </div>
            <span id="userId">--</span>
        </div>

        <div class="buttons-grid">
            <button class="btn" onclick="openModal('stop')">🛑<span>Стоп</span></button>
            <button class="btn" onclick="openModal('friends')">🤝<span>Дружим</span></button>
            <button class="btn" onclick="openModal('balance')">💵<span>Баланс</span></button>
            <button class="btn" onclick="sendCommand('!res')">💰<span>Ресы</span></button>
            <button class="btn" onclick="sendCommand('!shield')">🛡<span>Щит</span></button>
            <button class="btn" onclick="openModal('hunt')">🎯<span>Охота</span></button>
            <button class="btn" onclick="sendCommand('!stats')">📊<span>Стат</span></button>
            <button class="btn" onclick="openModal('camp')">⛺<span>Лагерь</span></button>
            <button class="btn" onclick="sendCommand('!dragon')">🐉<span>Дракон</span></button>
            <button class="btn" onclick="sendCommand('!exped')">🧭<span>Экспед</span></button>
            <button class="btn" onclick="sendCommand('!msg')">📢<span>Сообщ</span></button>
            <button class="btn" onclick="sendCommand('!restart')">🔄<span>Рестарт</span></button>
            <button class="btn btn-full" onclick="sendCommand('/menu')">🏠<span>Главное Меню</span></button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- ✅ ПАНЕЛЬ ЛОГОВ -->
    <div id="debugPanel"></div>
    <button id="toggleDebug" onclick="toggleDebug()">🐛</button>

    <script src="config.js?v=3"></script>
    <script src="app.js?v=3"></script>

    <!-- ✅ СКРИПТ ЛОГИРОВАНИЯ -->
    <script>
        // Панель логов
        const debugPanel = document.getElementById('debugPanel');
        let debugEnabled = false;

        // Функция логирования
        function debugLog(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = '[' + time + '] ' + message;
            debugPanel.appendChild(entry);
            debugPanel.scrollTop = debugPanel.scrollHeight;

            // Также в консоль
            console.log('[WEB APP]', message);
        }

        // Переключение панели
        function toggleDebug() {
            debugEnabled = !debugEnabled;
            debugPanel.classList.toggle('show', debugEnabled);
            debugLog('Debug panel: ' + (debugEnabled ? 'ON' : 'OFF'), 'info');
        }

        // Перехват console.log
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function () {
            originalLog.apply(console, arguments);
            if (debugEnabled) {
                debugLog(Array.from(arguments).join(' '), 'info');
            }
        };

        console.error = function () {
            originalError.apply(console, arguments);
            if (debugEnabled) {
                debugLog('ERROR: ' + Array.from(arguments).join(' '), 'error');
            }
        };

        // Лог при загрузке
        window.addEventListener('load', function () {
            debugLog('Web App loaded', 'success');
            debugLog('Telegram WebApp version: ' + (window.Telegram?.WebApp?.version || 'unknown'), 'info');
        });
    </script>
</body>

</html>
