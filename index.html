<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Мой Бот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 24px;
            color: var(--tg-theme-button-color, #3390ec);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 10px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.7;
        }

        .btn-full {
            grid-column: span 3;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }

        .status {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎀 Меню Бота</h1>
        <p>Выберите действие</p>
    </div>

    <div class="buttons-grid">
        <button class="btn" onclick="sendCommand('!bal')">💵 Баланс</button>
        <button class="btn" onclick="sendCommand('!res')">💰 Ресы</button>
        <button class="btn" onclick="sendCommand('!stats')">📊 Стат</button>

        <button class="btn" onclick="sendCommand('!shield')">🛡 Щит</button>
        <button class="btn" onclick="sendCommand('!hunt')">🎯 Охота</button>
        <button class="btn" onclick="sendCommand('!dragon')">🐉 Дракон</button>

        <button class="btn" onclick="sendCommand('!exped')">🧭 Экспед</button>
        <button class="btn" onclick="sendCommand('!camp')">⛺ Лагерь</button>
        <button class="btn" onclick="sendCommand('!msg')">📢 Сообщ</button>

        <button class="btn btn-full" onclick="sendCommand('/menu')">🏠 Главное Меню</button>
    </div>

    <div class="status" id="status">
        ✨ Ожидаю команду...
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран

        // Настройка цветов под тему Telegram
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.backgroundColor || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.textColor || '#000000');
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.buttonColor || '#3390ec');
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.buttonTextColor || '#ffffff');

        function sendCommand(command) {
            const status = document.getElementById('status');
            status.textContent = `✅ Отправлено: ${command}`;

            // Отправляем данные боту
            tg.sendData(command);

            // Закрываем Web App через 1 секунду
            setTimeout(() => {
                tg.close();
            }, 1000);
        }

        // Готово!
        tg.ready();
    </script>
</body>

</html>
